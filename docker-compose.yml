version: "3.9"

services:
  supabase-db:
    image: supabase/postgres:15.1.1.81
    container_name: jobharmony-supabase-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${SUPABASE_DB_PASSWORD:-postgres}
      POSTGRES_USER: ${SUPABASE_DB_USER:-postgres}
      POSTGRES_DB: ${SUPABASE_DB_NAME:-jobharmony_dev}
    ports:
      - "54322:5432"
    volumes:
      - supabase-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${SUPABASE_DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  supabase-data:
